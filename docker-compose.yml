version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: playto
      POSTGRES_USER: playto_user
      POSTGRES_PASSWORD: playto_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    ports:
      - "80:8080"
    environment:
      - DATABASE_URL=postgresql://playto_user:playto_password@db:5432/playto
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=False
      - ALLOWED_HOSTS=*
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
